<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>商家网站｜立即生成你的商业网站</title>
  <meta name="description" content="输入几项商家信息，立即生成清晰、专业、适合手机查看的商业网站。">
  <meta name="theme-color" content="#ffffff">
  <meta name="application-version" content="2.0">
  <link rel="canonical" href="https://shangjiawangzhan.com/">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/css/app.css?v=2.0">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/" aria-label="商家网站">
      <span class="brand-icon">商</span>
      <span class="brand-text" data-zh="商家网站" data-en="Business Website">商家网站</span>
    </a>
    <div class="header-actions">
      <button id="language-toggle" class="text-button" type="button" aria-label="Switch language">EN</button>
      <button id="manage-billing" class="text-button" type="button" data-zh="会员" data-en="Account">会员</button>
    </div>
  </header>

  <main class="app-main">
    <section id="create-view" class="create-view">
      <div class="intro">
        <p class="kicker" data-zh="立即创建" data-en="Create instantly">立即创建</p>
        <h1 data-zh="生成你的商家网站" data-en="Create your business website">生成你的商家网站</h1>
        <p data-zh="填写几项信息，马上查看网站。" data-en="Enter a few details and see your website instantly.">填写几项信息，马上查看网站。</p>
      </div>

      <form id="site-form" class="generator" novalidate>
        <div class="input-group">
          <label for="name" data-zh="商家名称" data-en="Business name">商家名称</label>
          <input id="name" name="name" maxlength="80" autocomplete="organization" required
                 placeholder="例如：新雅橱柜" data-placeholder-zh="例如：新雅橱柜" data-placeholder-en="Example: Nova Cabinetry">
        </div>

        <div class="input-group">
          <label for="industry" data-zh="你做什么生意？" data-en="What does your business do?">你做什么生意？</label>
          <input id="industry" name="industry" maxlength="100" required
                 placeholder="例如：橱柜定制、餐厅、美容服务" data-placeholder-zh="例如：橱柜定制、餐厅、美容服务" data-placeholder-en="Example: cabinetry, restaurant, beauty services">
        </div>

        <div class="two-columns">
          <div class="input-group">
            <label for="location" data-zh="城市 / 地区" data-en="City / Region">城市 / 地区</label>
            <input id="location" name="location" maxlength="80" autocomplete="address-level2" required
                   placeholder="例如：成都" data-placeholder-zh="例如：成都" data-placeholder-en="Example: Los Angeles">
          </div>
          <div class="input-group">
            <label for="contact" data-zh="联系方式" data-en="Contact">联系方式</label>
            <input id="contact" name="contact" maxlength="100" autocomplete="tel" required
                   placeholder="电话、微信或邮箱" data-placeholder-zh="电话、微信或邮箱" data-placeholder-en="Phone, email, or messaging app">
          </div>
        </div>

        <div class="upload-row">
          <input id="hero-image" name="heroImage" type="file" accept="image/jpeg,image/png,image/webp" hidden>
          <label for="hero-image" class="upload-button">
            <span class="upload-icon">＋</span>
            <span>
              <strong data-zh="添加图片" data-en="Add a photo">添加图片</strong>
              <small id="hero-image-state" data-zh="可选" data-en="Optional">可选</small>
            </span>
          </label>
        </div>

        <button id="generate" class="generate-button" type="submit">
          <span data-zh="立即生成" data-en="Generate now">立即生成</span>
          <b aria-hidden="true">→</b>
        </button>
        <p id="create-message" class="message" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section id="preview-view" class="preview-view" hidden>
      <div class="preview-header">
        <div>
          <p class="kicker" data-zh="你的网站" data-en="Your website">你的网站</p>
          <h2 data-zh="已经生成" data-en="Ready">已经生成</h2>
        </div>
        <div class="preview-actions-top">
          <button id="edit-site" class="small-button" type="button" data-zh="修改" data-en="Edit">修改</button>
          <button id="share-site" class="small-button" type="button" disabled data-zh="分享" data-en="Share">分享</button>
          <button id="use-site" class="small-button primary" type="button" disabled data-zh="发布" data-en="Publish">发布</button>
        </div>
      </div>

      <div id="preview-loading" class="loading-state" hidden>
        <span class="spinner"></span>
        <strong id="progress-text" data-zh="正在生成…" data-en="Creating…">正在生成…</strong>
      </div>

      <div class="preview-frame-wrap">
        <iframe id="preview" title="网站预览" sandbox="allow-same-origin allow-forms allow-popups" referrerpolicy="no-referrer"></iframe>
      </div>
      <code id="site-url" class="site-url"></code>
    </section>
  </main>

  <footer class="app-footer">
    <span>© 2026</span>
    <nav>
      <a href="pages/privacy.html" data-zh="隐私" data-en="Privacy">隐私</a>
      <a href="pages/terms.html" data-zh="条款" data-en="Terms">条款</a>
      <a href="pages/report.html" data-zh="联系" data-en="Contact">联系</a>
    </nav>
  </footer>

  <dialog id="upgrade-dialog">
    <div class="modal">
      <button class="close-button" type="button" data-close="upgrade-dialog" aria-label="Close">×</button>
      <p class="kicker" data-zh="发布网站" data-en="Publish website">发布网站</p>
      <h2 data-zh="开通你的网站" data-en="Publish your website">开通你的网站</h2>
      <div class="price"><b id="monthly-price">$15</b><span data-zh="/ 月" data-en="/ month">/ 月</span></div>
      <input id="checkout-email" type="email" autocomplete="email" placeholder="you@example.com">
      <button id="checkout-monthly" class="generate-button" type="button" data-zh="按月开通" data-en="Monthly plan">按月开通</button>
      <button id="checkout-yearly" class="outline-button" type="button" data-zh="按年开通 · $149" data-en="Yearly plan · $149">按年开通 · $149</button>
      <p id="checkout-message" class="message" role="status" aria-live="polite"></p>
    </div>
  </dialog>

  <dialog id="billing-dialog">
    <div class="modal">
      <button class="close-button" type="button" data-close="billing-dialog" aria-label="Close">×</button>
      <p class="kicker" data-zh="会员" data-en="Account">会员</p>
      <h2 data-zh="管理网站服务" data-en="Manage your website">管理网站服务</h2>
      <input id="billing-email" type="email" autocomplete="email" placeholder="you@example.com">
      <button id="open-portal" class="generate-button" type="button" data-zh="继续" data-en="Continue">继续</button>
      <p id="billing-message" class="message" role="status" aria-live="polite"></p>
    </div>
  </dialog>

  <script src="assets/js/config.js?v=2.0" defer></script>
  <script src="assets/js/api.js?v=2.0" defer></script>
  <script src="assets/js/app.js?v=2.0" defer></script>
</body>
</html>
