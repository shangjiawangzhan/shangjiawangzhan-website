<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>商家网站｜快速生成品牌官网</title>
  <meta name="description" content="输入商家名称，选择行业，立即生成并分享你的品牌网站。">
  <meta name="theme-color" content="#07111d">
  <meta name="application-version" content="1.0.0">
  <link rel="canonical" href="https://shangjiawangzhan.com/">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="styles.css?v=1.0.0">
</head>
<body>
<header class="topbar">
  <a class="brand" href="#top" aria-label="商家网站首页">
    <span class="brand-mark">商</span>
    <span><strong>商家网站</strong><small>SHANGJIA WANGZHAN</small></span>
  </a>
  <div class="top-actions">
    <button id="manage-billing" class="text-button" type="button">会员管理</button>
  </div>
</header>

<main id="top">
  <section id="studio" class="creator-hero">
    <div class="creator-copy">
      <span class="eyebrow">BUSINESS WEBSITE STUDIO</span>
      <h1>几秒生成<br><em>你的商家网站</em></h1>
      <p>输入名称，选择行业。</p>
    </div>

    <aside class="creator-card editor smart-builder">
      <div class="creator-field creator-name">
        <label for="name">商家名称</label>
        <input id="name" maxlength="70" autocomplete="organization" placeholder="例如：新雅橱柜">
      </div>

      <div class="creator-field">
        <label for="industry">主要行业</label>
        <select id="industry" aria-label="选择行业"></select>
      </div>

      <div class="quick-options">
        <div class="creator-field compact-field">
          <label for="city">城市 <span>可选</span></label>
          <input id="city" maxlength="40" autocomplete="address-level2" placeholder="成都">
        </div>
        <label class="photo-option">
          <input id="hero-image" type="file" accept="image/jpeg,image/png,image/webp">
          <span>添加照片</span>
          <b id="hero-image-state">可选</b>
        </label>
      </div>

      <button id="generate" class="primary-button full-button smart-generate" type="button">生成网站</button>
      <p id="create-message" class="create-message" role="status"></p>

      <button id="toggle-details" class="detail-toggle" type="button">更多内容</button>
      <div id="advanced-fields" class="advanced-fields" hidden>
        <input id="phone" maxlength="30" autocomplete="tel" placeholder="联系电话">
        <input id="email" type="email" maxlength="100" autocomplete="email" placeholder="邮箱">
        <input id="tagline" maxlength="100" placeholder="品牌主张">
        <textarea id="services" rows="3" maxlength="500" placeholder="主要服务，用逗号分开"></textarea>
        <textarea id="about" rows="4" maxlength="700" placeholder="品牌介绍"></textarea>
        <div class="mini-upload-row">
          <label class="upload"><span>Logo</span><input id="logo-image" type="file" accept="image/jpeg,image/png,image/webp,image/svg+xml"><b id="logo-image-state">选择</b></label>
          <label class="upload"><span>案例图片</span><input id="gallery-images" type="file" accept="image/jpeg,image/png,image/webp" multiple><b id="gallery-state">最多 6 张</b></label>
        </div>
      </div>
      <button id="reset" class="reset-link" type="button">重新开始</button>
    </aside>
  </section>

  <section class="preview-wrap section-shell preview-hidden" id="preview-wrap">
    <div class="preview-toolbar">
      <div class="device-switch">
        <button class="device active" data-width="100%" type="button">电脑</button>
        <button class="device" data-width="390px" type="button">手机</button>
      </div>
      <button id="change-template" class="text-button" type="button">换一个风格</button>
    </div>
    <div class="preview-stage"><iframe id="preview" title="网站预览"></iframe></div>
    <div class="action-bar">
      <div class="url-box"><small>网站链接</small><code id="site-url"></code></div>
      <div class="action-buttons">
        <button id="edit-site" class="secondary-button" type="button">修改</button>
        <button id="share-site" class="secondary-button" type="button">转发</button>
        <button id="use-site" class="primary-button" type="button">使用此网站</button>
      </div>
    </div>
  </section>
</main>

<footer>
  <div><strong>商家网站</strong><small>Business Website Studio</small></div>
  <nav><a href="privacy.html">隐私</a><a href="terms.html">条款</a><a href="acceptable-use.html">使用规范</a><a href="report.html">举报</a></nav>
  <span>© 2026 · v1.0</span>
</footer>

<dialog id="design-dialog">
  <div class="design-modal">
    <div class="design-modal-head">
      <div><span class="modal-kicker">DESIGNS</span><h2>换一个风格</h2></div>
      <button class="modal-close" data-close="design-dialog" aria-label="关闭">×</button>
    </div>
    <div id="template-grid" class="template-grid"></div>
  </div>
</dialog>

<dialog id="upgrade-dialog">
  <div class="modal">
    <button class="modal-close" data-close="upgrade-dialog" aria-label="关闭">×</button>
    <span class="modal-kicker">BUSINESS</span>
    <h2>升级品牌网站</h2>
    <div class="price"><b id="monthly-price">$15</b><span>/ 月</span></div>
    <div class="benefits"><span>移除平台标识</span><span>设置专属链接</span><span>绑定独立域名</span><span>高级模板与图片</span></div>
    <label class="checkout-email">付款邮箱<input id="checkout-email" type="email" placeholder="you@example.com"></label>
    <button id="checkout-monthly" class="primary-button full-button" type="button">按月开通</button>
    <button id="checkout-yearly" class="secondary-button full-button" type="button">按年开通</button>
    <p id="checkout-message" class="modal-message" role="status"></p>
  </div>
</dialog>

<dialog id="billing-dialog">
  <div class="modal">
    <button class="modal-close" data-close="billing-dialog" aria-label="关闭">×</button>
    <span class="modal-kicker">BILLING</span>
    <h2>会员管理</h2>
    <label class="checkout-email">付款邮箱<input id="billing-email" type="email" placeholder="you@example.com"></label>
    <button id="open-portal" class="primary-button full-button" type="button">打开会员管理</button>
    <p id="billing-message" class="modal-message" role="status"></p>
  </div>
</dialog>

<script src="config.js?v=1.0.0"></script>
<script src="script.js?v=1.0.0"></script>
</body>
</html>
