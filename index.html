<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>商家网站｜创建你的品牌官网</title>
  <meta name="description" content="选择设计，生成并分享你的商家网站。">
  <meta name="theme-color" content="#07111d">
  <meta name="application-version" content="1.0.0">
  <link rel="canonical" href="https://shangjiawangzhan.com/">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="styles.css?v=1.0.0">
</head>
<body>
<header class="topbar">
  <a class="brand" href="#top" aria-label="商家网站首页">
    <span class="brand-mark">商</span>
    <span><strong>商家网站</strong><small>SHANGJIA WANGZHAN</small></span>
  </a>
  <div class="top-actions">
    <button id="manage-billing" class="text-button" type="button">会员管理</button>
    <a class="top-cta" href="#templates">开始创建</a>
  </div>
</header>

<main id="top">
  <section class="hero">
    <div class="hero-copy">
      <span class="eyebrow">BUSINESS WEBSITE STUDIO</span>
      <h1>选择设计<br><em>生成你的商家网站</em></h1>
      <a class="primary-button" href="#templates">选择设计</a>
    </div>
    <div class="hero-showcase" aria-hidden="true">
      <div class="showcase-card showcase-a"></div>
      <div class="showcase-card showcase-b"></div>
      <div class="showcase-card showcase-c"></div>
    </div>
  </section>

  <section id="templates" class="template-section section-shell">
    <div class="section-title"><span>DESIGNS</span><h2>选择设计</h2></div>
    <div id="template-grid" class="template-grid"></div>
  </section>

  <section id="studio" class="studio section-shell">
    <aside class="editor">
      <div class="editor-head">
        <div><small>WEBSITE</small><h2>网站内容</h2></div>
        <button id="reset" class="icon-button" type="button" aria-label="重置">↺</button>
      </div>
      <div class="field-grid">
        <label>商家名称<input id="name" maxlength="70" placeholder="山海空间设计"></label>
        <label>城市<input id="city" maxlength="40" placeholder="成都"></label>
        <label class="full">行业<select id="industry"></select></label>
        <label>电话<input id="phone" maxlength="30" placeholder="138 0000 0000"></label>
        <label>邮箱<input id="email" type="email" maxlength="100" placeholder="hello@example.com"></label>
        <label class="full">品牌主张<input id="tagline" maxlength="100" placeholder="让每一寸空间，更适合真实生活"></label>
        <label class="full">主要服务<textarea id="services" rows="3" maxlength="500" placeholder="定制橱柜，衣柜设计，空间收纳，安装服务"></textarea></label>
        <label class="full">品牌介绍<textarea id="about" rows="4" maxlength="700" placeholder="介绍品牌、服务范围与特色"></textarea></label>
        <label class="upload full"><span>主视觉图片</span><input id="hero-image" type="file" accept="image/jpeg,image/png,image/webp"><b id="hero-image-state">选择图片</b></label>
        <label class="upload"><span>Logo</span><input id="logo-image" type="file" accept="image/jpeg,image/png,image/webp,image/svg+xml"><b id="logo-image-state">选择图片</b></label>
        <label class="upload"><span>案例图片</span><input id="gallery-images" type="file" accept="image/jpeg,image/png,image/webp" multiple><b id="gallery-state">最多 6 张</b></label>
      </div>
      <button id="generate" class="primary-button full-button" type="button">生成网站</button>
    </aside>

    <section class="preview-wrap" id="preview-wrap">
      <div class="preview-toolbar">
        <div class="device-switch">
          <button class="device active" data-width="100%" type="button">电脑</button>
          <button class="device" data-width="390px" type="button">手机</button>
        </div>
        <button id="change-template" class="text-button" type="button">更换设计</button>
      </div>
      <div class="preview-stage"><iframe id="preview" title="网站预览"></iframe></div>
      <div class="action-bar">
        <div class="url-box"><small>网站链接</small><code id="site-url"></code></div>
        <div class="action-buttons">
          <button id="edit-site" class="secondary-button" type="button">修改</button>
          <button id="share-site" class="secondary-button" type="button">转发</button>
          <button id="use-site" class="primary-button" type="button">一键使用</button>
        </div>
      </div>
    </section>
  </section>
</main>

<footer>
  <div><strong>商家网站</strong><small>Business Website Studio</small></div>
  <nav><a href="privacy.html">隐私</a><a href="terms.html">条款</a><a href="acceptable-use.html">使用规范</a><a href="report.html">举报</a></nav>
  <span>© 2026 · v1.0</span>
</footer>

<dialog id="upgrade-dialog">
  <div class="modal">
    <button class="modal-close" data-close="upgrade-dialog" aria-label="关闭">×</button>
    <span class="modal-kicker">BUSINESS</span>
    <h2>升级品牌网站</h2>
    <div class="price"><b id="monthly-price">$15</b><span>/ 月</span></div>
    <div class="benefits"><span>移除平台标识</span><span>设置专属链接</span><span>绑定独立域名</span><span>高级模板与图片</span></div>
    <label class="checkout-email">付款邮箱<input id="checkout-email" type="email" placeholder="you@example.com"></label>
    <button id="checkout-monthly" class="primary-button full-button" type="button">按月开通</button>
    <button id="checkout-yearly" class="secondary-button full-button" type="button">按年开通</button>
    <p id="checkout-message" class="modal-message" role="status"></p>
  </div>
</dialog>

<dialog id="billing-dialog">
  <div class="modal">
    <button class="modal-close" data-close="billing-dialog" aria-label="关闭">×</button>
    <span class="modal-kicker">BILLING</span>
    <h2>会员管理</h2>
    <label class="checkout-email">付款邮箱<input id="billing-email" type="email" placeholder="you@example.com"></label>
    <button id="open-portal" class="primary-button full-button" type="button">打开会员管理</button>
    <p id="billing-message" class="modal-message" role="status"></p>
  </div>
</dialog>

<script src="config.js?v=1.0.0"></script>
<script src="script.js?v=1.0.0"></script>
</body>
</html>
